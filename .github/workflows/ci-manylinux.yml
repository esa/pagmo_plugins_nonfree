name: Manylinux CI

on:
  push:
    branches:
      - master
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  arm64-manylinux228:
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        build-type: ["Python314"]
    container:
      image: pagmo2/manylinux_2_28_aarch64_with_deps:latest
      env:
        PPNF_BUILD_TYPE: ${{ matrix.build-type }}
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: bash tools/gha_manylinux.sh

  amd64-manylinux228:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build-type: ["Python314"]
    container:
      image: pagmo2/manylinux_2_28_x86_64_with_deps:latest
      env:
        PPNF_BUILD_TYPE: ${{ matrix.build-type }}
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: bash tools/gha_manylinux.sh